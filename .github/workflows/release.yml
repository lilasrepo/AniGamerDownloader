name: release

# Build the three downloadable artifacts on a version tag (vX.Y.Z):
#   * Windows portable pack  -> zipped onedir, attached to the GitHub Release
#   * Multi-arch Docker image -> ghcr.io/<owner>/anigamerdownloader (amd64+arm64)
# Source code is the repo itself (clone / "Download ZIP").
#
# workflow_dispatch builds both WITHOUT publishing (dry run): the Windows pack is
# uploaded only as a workflow artifact and the image is built but not pushed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the Release + upload the zip
  packages: write   # push the image to GHCR

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-venv.txt
          pip install pyinstaller pywebview

      - name: Fetch WebView2 Evergreen bootstrapper
        run: |
          New-Item -ItemType Directory -Force shells\webview2 | Out-Null
          curl.exe -L -o shells\webview2\MicrosoftEdgeWebview2Setup.exe "https://go.microsoft.com/fwlink/p/?LinkId=2124703"

      # Mirror scripts\build_desktop.bat (the verified recipe): --collect-all the
      # webview/pythonnet/clr_loader/gevent stack so the frozen WebView2 backend
      # loads, and bundle web/, the danmu template and the WebView2 bootstrapper.
      - name: Build portable app (PyInstaller onedir)
        run: |
          python -m PyInstaller --noconfirm --name AniGamerDownloader --windowed `
            --collect-all webview --collect-all clr_loader --collect-all pythonnet --collect-all gevent `
            --collect-submodules core --collect-submodules app --collect-submodules shells `
            --hidden-import webview.platforms.edgechromium --hidden-import clr `
            --add-data "web;web" --add-data "data\DanmuTemplate.ass;data" `
            --add-data "shells\webview2\MicrosoftEdgeWebview2Setup.exe;webview2" `
            --icon "web\static\img\AniGamerDownloader.ico" `
            --distpath dist --workpath build\pyi shells\desktop.py

      - name: Zip portable folder
        run: Compress-Archive -Path dist\AniGamerDownloader\* -DestinationPath AniGamerDownloader-windows-portable-${{ github.ref_name }}.zip

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AniGamerDownloader-windows-portable-*.zip

      - name: Upload as workflow artifact (dry runs)
        uses: actions/upload-artifact@v4
        with:
          name: AniGamerDownloader-windows-portable
          path: AniGamerDownloader-windows-portable-*.zip

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/anigamerdownloader
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build (and push on tags) multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: shells/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
