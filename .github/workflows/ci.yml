name: ci

# Cheap sanity check on every push / PR: byte-compile the source trees so an
# obvious syntax error never reaches a release build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Byte-compile sources
        run: python -m compileall -q core app shells cli.py
